<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RisuAI Chat Viewer & Extractor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1f;
    color: #e0d6c8;
    font-family: 'Georgia', serif;
    line-height: 1.85;
    font-size: 16px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #toolbar {
    height: 56px;
    background: #111115;
    border-bottom: 1px solid #2e2e3a;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
    flex-shrink: 0;
  }

  #toolbar h1 {
    font-size: 14px;
    font-weight: normal;
    color: #888;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .btn {
    background: #2a2a35;
    border: 1px solid #3a3a48;
    color: #c0b8a8;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #35354a; }
  .btn.primary { background: #404070; border-color: #6060a0; color: #fff; }

  #layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #sidebar {
    width: 280px;
    background: #141418;
    border-right: 1px solid #2e2e3a;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  #sidebar-header {
    padding: 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #555;
    border-bottom: 1px solid #22222a;
  }

  #session-list {
    flex: 1;
    overflow-y: auto;
  }

  .session-item {
    padding: 14px 16px;
    border-bottom: 1px solid #1e1e24;
    cursor: pointer;
    font-size: 13px;
    color: #888;
    transition: all 0.2s;
  }
  .session-item:hover { background: #1e1e24; color: #c0b8a8; }
  .session-item.active { background: #252530; color: #e0d6c8; border-left: 3px solid #6060a0; }

  #content-area {
    flex: 1;
    overflow-y: auto;
    position: relative;
    padding: 40px 0;
  }

  #main-container {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  #drop-zone {
    border: 2px dashed #3a3a48;
    border-radius: 8px;
    padding: 100px 24px;
    text-align: center;
    color: #555;
    margin-top: 40px;
  }
  #drop-zone.dragover { border-color: #6060a0; color: #8080c0; }

  .message { margin-bottom: 32px; padding-bottom: 32px; border-bottom: 1px solid #22222a; }
  .message:last-child { border-bottom: none; }
  .message.user .content { color: #b0c4a8; background: #1e2420; border-left: 3px solid #4a6a48; padding: 12px 16px; border-radius: 0 4px 4px 0; }
  .message .content p { margin-bottom: 1em; }
  .message .content p:last-child { margin-bottom: 0; }
  .message .meta { font-size: 11px; color: #444; margin-bottom: 8px; display: flex; gap: 10px; align-items: center; }
  .meta .role-badge { padding: 1px 7px; border-radius: 3px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
  .char .role-badge { background: #2a2040; color: #9080c0; }
  .user .role-badge { background: #1a2a1a; color: #5a8a5a; }
  em { font-style: italic; color: #c8b890; }
  strong { font-weight: bold; }
  
  #file-input { display: none; }
</style>
</head>
<body>

<div id="toolbar">
  <h1 id="file-title">RisuAI Chat Viewer & Extractor</h1>
  <button id="btn-save-all" class="btn primary" style="display:none;" onclick="saveAllMarkdown()">💾 전체 저장 (.zip)</button>
  <button id="btn-save-current" class="btn" style="display:none;" onclick="saveActiveSession()">💾 현재 세션 저장</button>
  <button class="btn" onclick="document.getElementById('file-input').click()">📂 JSON 열기</button>
  <input type="file" id="file-input" accept=".json">
</div>

<div id="layout">
  <div id="sidebar" style="display:none;">
    <div id="sidebar-header">Sessions</div>
    <div id="session-list"></div>
  </div>
  <div id="content-area">
    <div id="main-container">
      <div id="drop-zone">
        <p>RisuAI JSON 파일을 여기에 드래그하세요</p>
        <button class="btn" onclick="document.getElementById('file-input').click()" style="margin-top:20px;">또는 파일 선택</button>
      </div>
      <div id="messages"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let currentData = null;
let currentFileName = "";
let activeIndex = 0;
let normalizedChats = [];

function cleanText(text) {
  if (!text) return "";
  text = text.replace(/<details>[\s\S]*?<\/details>/g, '');
  text = text.replace(/<\/?narrative>/g, '');
  text = text.replace(/<(psyche-status|world-info|summary|details)>[\s\S]*?<\/\1>/g, '');
  text = text.replace(/^\s*---\s*\n/, '');
  return text.trim();
}

function toHtml(text) {
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  return text.split(/\n{2,}/).map(p => `<p>${p.trim().replace(/\n/g, '<br>')}</p>`).join('');
}

function renderSidebar() {
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  normalizedChats.forEach((session, i) => {
    const div = document.createElement('div');
    div.className = `session-item ${i === activeIndex ? 'active' : ''}`;
    const firstMsg = session.message.find(m => m.data)?.data || "";
    const preview = cleanText(firstMsg).substring(0, 30) + "...";
    div.innerHTML = `<div style="font-weight:bold;margin-bottom:4px;">Session ${i + 1}</div><div style="font-size:11px;opacity:0.6;">${preview}</div>`;
    div.onclick = () => { activeIndex = i; renderSidebar(); renderActiveSession(); };
    list.appendChild(div);
  });
  document.getElementById('sidebar').style.display = 'flex';
}

function renderActiveSession() {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  const messages = normalizedChats[activeIndex].message || [];
  
  messages.forEach(msg => {
    const role = msg.role || 'user';
    const content = cleanText(msg.data);
    if (!content) return;
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const time = msg.time ? new Date(msg.time).toLocaleString('ko-KR') : '';
    const model = msg.generationInfo?.model || '';
    div.innerHTML = `<div class="meta"><span class="role-badge">${role === 'char' ? 'Char' : 'User'}</span>${time ? `<span>${time}</span>` : ''}${model ? `<span class="model-info">${model}</span>` : ''}</div><div class="content">${toHtml(content)}</div>`;
    container.appendChild(div);
  });
  document.getElementById('content-area').scrollTop = 0;
}

function saveActiveSession() {
  const content = normalizedChats[activeIndex].message.map(msg => cleanText(msg.data)).filter(Boolean).join('\n\n');
  const blob = new Blob([content], { type: "text/markdown" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${currentFileName.replace(/\.json$/i, "")}_session_${activeIndex + 1}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

async function saveAllMarkdown() {
  const zip = new JSZip();
  const baseName = currentFileName.replace(/\.json$/i, "");
  normalizedChats.forEach((session, i) => {
    const content = session.message.map(msg => cleanText(msg.data)).filter(Boolean).join('\n\n');
    if (content) zip.file(`${baseName}_session_${i + 1}.md`, content);
  });
  const blob = await zip.generateAsync({ type: "blob" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${baseName}_all.zip`;
  a.click();
  URL.revokeObjectURL(url);
}

function loadFile(file) {
  currentFileName = file.name;
  document.getElementById('file-title').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const rawData = JSON.parse(e.target.result);
      // Normalize: single 'risuChat' has data as object, 'risuAllChats' has data as array
      let chats = rawData.data;
      if (!chats) throw new Error("No data");
      normalizedChats = Array.isArray(chats) ? chats : [chats];
      
      activeIndex = 0;
      document.getElementById('drop-zone').style.display = 'none';
      document.getElementById('btn-save-all').style.display = 'block';
      document.getElementById('btn-save-current').style.display = 'block';
      renderSidebar();
      renderActiveSession();
    } catch (err) { alert('JSON 파싱 오류: ' + err.message); }
  };
  reader.readAsText(file, 'utf-8');
}

document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
document.body.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop-zone').classList.add('dragover'); });
document.body.addEventListener('dragleave', () => document.getElementById('drop-zone').classList.remove('dragover'));
document.body.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
</script>
</body>
</html>
