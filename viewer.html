<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RisuAI Chat Viewer & Extractor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1f;
    color: #e0d6c8;
    font-family: 'Georgia', serif;
    line-height: 1.85;
    font-size: 16px;
  }

  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #111115;
    border-bottom: 1px solid #2e2e3a;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
  }

  #toolbar h1 {
    font-size: 14px;
    font-weight: normal;
    color: #888;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #file-input {
    display: none;
  }

  .btn {
    background: #2a2a35;
    border: 1px solid #3a3a48;
    color: #c0b8a8;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #35354a; }
  .btn.primary { background: #404070; border-color: #6060a0; color: #fff; }
  .btn.primary:hover { background: #505090; }

  #stats {
    font-size: 12px;
    color: #555;
    white-space: nowrap;
  }

  #main {
    max-width: 760px;
    margin: 0 auto;
    padding: 80px 24px 80px;
  }

  #drop-zone {
    border: 2px dashed #3a3a48;
    border-radius: 8px;
    padding: 100px 24px;
    text-align: center;
    color: #555;
    margin-top: 20px;
    transition: border-color 0.2s;
  }
  #drop-zone.dragover { border-color: #6060a0; color: #8080c0; }
  #drop-zone p { margin-bottom: 12px; font-size: 18px; }

  .session-container {
    margin-bottom: 80px;
    position: relative;
  }

  .session-header {
    text-align: center;
    border-bottom: 2px solid #3a3a48;
    padding: 20px 0;
    margin-bottom: 40px;
    color: #6060a0;
    font-weight: bold;
    letter-spacing: 0.2em;
    font-size: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
  }

  .message {
    margin-bottom: 32px;
    padding-bottom: 32px;
    border-bottom: 1px solid #22222a;
  }
  .message:last-child { border-bottom: none; }

  .message.char .content {
    color: #e0d6c8;
  }

  .message.user .content {
    color: #b0c4a8;
    background: #1e2420;
    border-left: 3px solid #4a6a48;
    padding: 12px 16px;
    border-radius: 0 4px 4px 0;
  }

  .message .content p {
    margin-bottom: 1em;
  }
  .message .content p:last-child { margin-bottom: 0; }

  .message .meta {
    font-size: 11px;
    color: #444;
    margin-bottom: 8px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .meta .role-badge {
    padding: 1px 7px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .char .role-badge { background: #2a2040; color: #9080c0; }
  .user .role-badge { background: #1a2a1a; color: #5a8a5a; }

  .meta .model-info { color: #3a3a50; }

  em { font-style: italic; color: #c8b890; }
  strong { font-weight: bold; }

  #no-content {
    text-align: center;
    color: #444;
    padding: 40px;
    display: none;
  }
</style>
</head>
<body>

<div id="toolbar">
  <h1 id="file-title">RisuAI Chat Viewer & Extractor</h1>
  <span id="stats"></span>
  <button id="btn-save-all" class="btn primary" style="display:none;" onclick="saveAllMarkdown()">💾 전체 저장 (.zip)</button>
  <button class="btn" onclick="document.getElementById('file-input').click()">📂 JSON 열기</button>
  <input type="file" id="file-input" accept=".json">
</div>

<div id="main">
  <div id="drop-zone">
    <p>RisuAI JSON 파일을 여기에 드래그하세요</p>
    <button class="btn" onclick="document.getElementById('file-input').click()">또는 파일 선택</button>
  </div>
  <div id="messages"></div>
  <div id="no-content">메시지가 없습니다.</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let currentData = null;
let currentFileName = "";

function cleanText(text) {
  if (!text) return "";
  text = text.replace(/<details>[\s\S]*?<\/details>/g, '');
  text = text.replace(/<\/?narrative>/g, '');
  text = text.replace(/<(psyche-status|world-info|summary|details)>[\s\S]*?<\/\1>/g, '');
  text = text.replace(/^\s*---\s*\n/, '');
  return text.trim();
}

function toHtml(text) {
  text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  const paras = text.split(/\n{2,}/);
  return paras.map(p => `<p>${p.trim().replace(/\n/g, '<br>')}</p>`).join('');
}

function render(data) {
  const container = document.getElementById('messages');
  const dropZone  = document.getElementById('drop-zone');
  const noContent = document.getElementById('no-content');
  const saveBtn   = document.getElementById('btn-save-all');
  
  container.innerHTML = '';
  dropZone.style.display = 'none';
  saveBtn.style.display = 'block';

  const chats = data.data || [];
  let totalMessages = 0;

  chats.forEach((session, i) => {
    const messages = session.message || [];
    if (messages.length === 0) return;

    const sessionDiv = document.createElement('div');
    sessionDiv.className = 'session-container';

    const header = document.createElement('div');
    header.className = 'session-header';
    
    const title = document.createElement('span');
    title.textContent = `SESSION ${i + 1}`;
    header.appendChild(title);

    const individualSaveBtn = document.createElement('button');
    individualSaveBtn.className = 'btn';
    individualSaveBtn.textContent = '💾 이 세션만 저장';
    individualSaveBtn.onclick = () => saveSessionMarkdown(i);
    header.appendChild(individualSaveBtn);

    sessionDiv.appendChild(header);

    messages.forEach(msg => {
      const role = msg.role || 'user';
      const content = cleanText(msg.data);
      if (!content) return;

      totalMessages++;
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const time = msg.time ? new Date(msg.time).toLocaleString('ko-KR') : '';
      const model = msg.generationInfo?.model || '';
      div.innerHTML = `
        <div class="meta">
          <span class="role-badge">${role === 'char' ? 'Char' : 'User'}</span>
          ${time ? `<span>${time}</span>` : ''}
          ${model ? `<span class="model-info">${model}</span>` : ''}
        </div>
        <div class="content">${toHtml(content)}</div>
      `;
      sessionDiv.appendChild(div);
    });
    
    container.appendChild(sessionDiv);
  });

  document.getElementById('stats').textContent = `${totalMessages}개 메시지`;
  if (totalMessages === 0) {
    noContent.style.display = 'block';
    saveBtn.style.display = 'none';
  }
}

function getSessionMarkdown(index) {
  const session = currentData.data[index];
  const messages = session.message || [];
  return messages.map(msg => cleanText(msg.data)).filter(Boolean).join('\n\n');
}

function saveSessionMarkdown(index) {
  const content = getSessionMarkdown(index);
  const blob = new Blob([content], { type: "text/markdown" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${currentFileName.replace(/\.json$/i, "")}_session_${index + 1}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

async function saveAllMarkdown() {
  const zip = new JSZip();
  const baseName = currentFileName.replace(/\.json$/i, "");
  
  currentData.data.forEach((session, i) => {
    const content = getSessionMarkdown(i);
    if (content) {
      zip.file(`${baseName}_session_${i + 1}.md`, content);
    }
  });

  const blob = await zip.generateAsync({ type: "blob" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${baseName}_all_sessions.zip`;
  a.click();
  URL.revokeObjectURL(url);
}

function loadFile(file) {
  currentFileName = file.name;
  document.getElementById('file-title').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      currentData = JSON.parse(e.target.result);
      render(currentData);
    } catch {
      alert('JSON 파싱 오류.');
    }
  };
  reader.readAsText(file, 'utf-8');
}

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

document.body.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop-zone').classList.add('dragover'); });
document.body.addEventListener('dragleave', () => document.getElementById('drop-zone').classList.remove('dragover'));
document.body.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
</script>
</body>
</html>
